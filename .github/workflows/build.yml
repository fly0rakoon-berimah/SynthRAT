name: Build Android APK

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-payload]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
          
      - name: Make gradlew executable
        run: chmod +x gradlew
          
      - name: Build with Gradle
        run: ./gradlew assembleRelease
        
      - name: Find APK
        id: find-apk
        run: |
          APK_PATH=$(find app/build/outputs -name "*.apk" -type f | head -n 1)
          echo "Found APK: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          
      - name: Create debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US"
      
      - name: Sign APK with apksigner
        run: |
          # Find Android SDK build-tools
          BUILD_TOOLS_DIR=$ANDROID_HOME/build-tools/*/
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" -type f | head -n 1)
          
          echo "Using apksigner: $APKSIGNER"
          
          # Sign the APK
          $APKSIGNER sign --ks debug.keystore --ks-pass pass:android \
            --ks-key-alias debug --key-pass pass:android \
            "${{ steps.find-apk.outputs.apk_path }}"
          
          # Verify signature
          $APKSIGNER verify "${{ steps.find-apk.outputs.apk_path }}"
          
          echo "✅ APK signed successfully"
          
      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: ${{ steps.find-apk.outputs.apk_path }}
          if-no-files-found: error
